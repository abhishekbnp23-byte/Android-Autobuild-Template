name: Android APK Auto Builder

on:
  push:
    branches: [ "main" ] # जैसे ही हम पाइथन से कोड इस ब्रांच में भेजेंगे, यह चालू हो जाएगा

jobs:
  build:
    runs-on: ubuntu-latest # गिटहब का मुफ्त क्लाउड कंप्यूटर (Linux)

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Change Permissions for Gradle
      run: chmod +x gradlew
      continue-on-error: true

    - name: Build Debug APK
      run: ./gradlew assembleDebug
      continue-on-error: true

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Finished-Android-APK
        path: app/build/outputs/apk/debug/app-debug.apk
